name: Nexus Server CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Еженедельная проверка зависимостей на уязвимости (каждый понедельник в 6:00 UTC)
    - cron: '0 6 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cryptography
        # Если есть файл requirements.txt, используйте его
        # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        pip install flake8
        # Останавливаем сборку при синтаксических ошибках или неопределённых именах
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Выходим с ошибкой, если есть нарушения стиля (опционально)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check security issues with bandit
      run: |
        pip install bandit
        bandit -r . -ll -f json -o bandit-report.json || true
      continue-on-error: true

    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report-${{ matrix.python-version }}
        path: bandit-report.json

    - name: Check for secrets using truffleHog (OSS)
      run: |
        docker run --rm -v "${{ github.workspace }}:/repo" trufflesecurity/trufflehog:latest filesystem /repo --no-verification --fail
      continue-on-error: true

    - name: Run server smoke test
      run: |
        # Запускаем сервер в фоне на свободном порту
        python server.py &
        SERVER_PID=$!
        sleep 3
        # Проверяем, что процесс жив
        if kill -0 $SERVER_PID 2>/dev/null; then
          echo "Server started successfully"
          kill $SERVER_PID
        else
          echo "Server failed to start"
          exit 1
        fi
      env:
        NEXUS_PORT: 6666
        NEXUS_NO_LOGS: 1
        DEBUG: 0

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner (filesystem)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run CodeQL analysis
      uses: github/codeql-action/init@v3
      with:
        languages: python
    - uses: github/codeql-action/analyze@v3

  docker:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/nexus-server
        tags: |
          type=ref,event=branch
          type=sha,format=short
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
